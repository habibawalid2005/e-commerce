<div [class]="backgroundClass()">
  <div class="container mx-auto px-4 py-12 sm:py-16">
    <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
      <a class="hover:text-white transition-colors font-medium" routerLink="/home">
        {{ 'navbar.home' | translate }}
      </a>

      @for (item of breadcrumbs(); track $index) {
        <span class="text-white/40">/</span>

        @if (item.link) {
          <a [routerLink]="item.link" class="hover:text-white transition-colors font-medium">
            {{ item.label }}
          </a>
        } @else {
          <span class="text-white font-medium">{{ item.label }}</span>
        }
      }
    </nav>
    <div class="flex items-center gap-5">
      <div
        class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30"
      >
        @if (imageUrl()) {
          <img [src]="imageUrl()" [alt]="title()" class="w-12 h-12 object-contain" />
        } @else {
          <i [class]="iconClass() + ' text-3xl'"></i>
        }
      </div>
      <div>
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">{{ title() }}</h1>
        <p class="text-white/80 mt-1 font-medium">{{ description() }}</p>
      </div>
    </div>
  </div>
</div>
