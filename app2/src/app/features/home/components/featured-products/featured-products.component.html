<section class="py-10">
  <div class="container px-4 sm:px-6 lg:px-8">
    <app-section-title
      [title]="'featuredProducts.title' | translate"
      [highlighted]="'featuredProducts.highlighted' | translate"
    >
    </app-section-title>
    <div
      class="products grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"
    >
      @for (product of productsList(); track product._id) {
        <app-product-card [product]="product"></app-product-card>
      }
    </div>
  </div>
</section>
