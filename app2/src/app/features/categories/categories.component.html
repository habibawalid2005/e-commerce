<div class="min-h-screen bg-gray-50/50">
  <app-page-header
    [title]="'allCategoriesPage.pageTitle' | translate"
    [description]="'allCategoriesPage.pageDescription' | translate"
    [breadcrumbs]="[{ label: ('allCategoriesPage.breadcrumb' | translate) }]"
    [iconClass]="'fa-solid fa-layer-group'"
  >
  </app-page-header>

  @if (isLoadingCategories()) {
    <div class="container px-4 py-10">
      <app-loading-spinner
        [message]="'allCategoriesPage.loading' | translate"
      ></app-loading-spinner>
    </div>
  } @else {
    @if (categoriesList().length > 0) {
      <section class="py-10">
        <div class="container mx-auto px-4">
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
            @for (category of categoriesList(); track category._id) {
              <a
                class="group bg-white rounded-2xl border border-gray-100 p-4 sm:p-6 shadow-sm hover:shadow-xl hover:border-primary-200 transition-all duration-300 hover:-translate-y-1"
                [routerLink]="['/categories', category._id]"
              >
                <div class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-4">
                  <img
                    [alt]="category.name"
                    class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                    [src]="category.image"
                  />
                </div>
                <h3
                  class="font-bold text-gray-900 text-center group-hover:text-primary-600 transition-colors"
                >
                  {{ category.name }}
                </h3>
                <div
                  class="flex justify-center mt-2 opacity-0 group-hover:opacity-100 transition-opacity"
                >
                  <span class="text-xs text-primary-600 flex items-center gap-1 font-medium">
                    {{ 'allCategoriesPage.viewSubcategories' | translate }}

                    <i class="fa-solid fa-arrow-right text-2xs"></i>
                  </span>
                </div>
              </a>
            }
          </div>
        </div>
      </section>
    } @else {
      <div class="container px-4 py-10">
        <app-empty-state
          [iconClass]="'fa-solid fa-layer-group text-3xl text-gray-400'"
          [title]="'allCategoriesPage.noCategories' | translate"
          [desc]="'allCategoriesPage.noCategoriesDesc' | translate"
        ></app-empty-state>
      </div>
    }
  }
</div>
